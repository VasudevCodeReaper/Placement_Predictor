<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Placement Prediction System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    background:linear-gradient(135deg,#141E30,#243B55);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;

}

.container{

    width:900px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);

}

h1{

    text-align:center;
    color:#333;
    margin-bottom:30px;

}

.grid{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;

}

input,
select{

    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #bbb;
    font-size:15px;
    background:white;

}

input:focus,
select:focus{

    outline:none;
    border-color:#2196F3;

}

button{

    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#1976D2;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;

}

button:hover{

    background:#0D47A1;

}

.result{

    margin-top:40px;
    text-align:center;

}

.pred{

    font-size:32px;
    font-weight:bold;

}

.prob{

    margin-top:15px;
    font-size:42px;
    color:#1565C0;
    font-weight:bold;

}

.bar{

    width:100%;
    height:28px;
    background:#ddd;
    border-radius:30px;
    overflow:hidden;
    margin-top:20px;

}

.fill{

    height:100%;
    transition:width .8s ease;

{% if probability %}
    {% if probability >= 80 %}
        background:#2ecc71;
    {% elif probability >=60 %}
        background:#f39c12;
    {% else %}
        background:#e74c3c;
    {% endif %}
{% else %}
    background:#2ecc71;
{% endif %}

}

.info{

    margin-top:20px;
    font-size:20px;

}

hr{

    margin-top:30px;
    margin-bottom:30px;

}

</style>

</head>

<body>

<div class="container">

<h1>🎓 Student Placement Prediction System</h1>

<form method="POST">

<div class="grid">

<select name="gender" required>
<option value="">Select Gender</option>
<option value="M">Male</option>
<option value="F">Female</option>
</select>

<input
type="number"
name="ssc_percentage"
placeholder="SSC Percentage"
min="0"
max="100"
step="0.01"
required>

<select name="ssc_board" required>
<option value="">SSC Board</option>
<option value="Central">Central</option>
<option value="Others">Others</option>
</select>

<input
type="number"
name="hsc_percentage"
placeholder="HSC Percentage"
min="0"
max="100"
step="0.01"
required>

<select name="hsc_board" required>
<option value="">HSC Board</option>
<option value="Central">Central</option>
<option value="Others">Others</option>
</select>

<select name="hsc_subject" required>
<option value="">HSC Subject</option>
<option value="Arts">Arts</option>
<option value="Commerce">Commerce</option>
<option value="Science">Science</option>
</select>

<input
type="number"
name="degree_percentage"
placeholder="Degree Percentage"
min="0"
max="100"
step="0.01"
required>

<select name="undergrad_degree" required>
<option value="">Undergraduate Degree</option>
<option value="Comm&Mgmt">Commerce & Management</option>
<option value="Others">Others</option>
<option value="Sci&Tech">Science & Technology</option>
</select>

<select name="work_experience" required>
<option value="">Work Experience</option>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<input
type="number"
name="emp_test_percentage"
placeholder="Employability Test Percentage"
min="0"
max="100"
step="0.01"
required>

<select name="specialisation" required>
<option value="">Specialisation</option>
<option value="Mkt&Fin">Marketing & Finance</option>
<option value="Mkt&HR">Marketing & HR</option>
</select>

<input
type="number"
name="mba_percent"
placeholder="MBA Percentage"
min="0"
max="100"
step="0.01"
required>

</div>

<button type="submit">

🚀 Predict Placement

</button>

</form>

{% if prediction %}

<hr>

<div class="result">

<div class="pred">

{{ prediction }}

</div>

<div class="prob">

{{ "%.2f"|format(probability) }}%

</div>

<h3>

Placement Probability

</h3>

<div class="bar">

<div
class="fill"
style="width:{{ probability }}%;">

</div>

</div>

<div class="info">

<b>Confidence :</b> {{ confidence }}

</div>

</div>

{% endif %}

</div>

</body>

</html>
